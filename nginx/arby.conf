# Arby nginx config — installed on host at /etc/nginx/conf.d/arby.nostrabotus.com.conf
# Proxies to the arby-ui Docker container on host port 3000.

server {
    listen 80;
    server_name arby.nostrabotus.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name arby.nostrabotus.com;

    ssl_certificate     /etc/letsencrypt/live/arby.nostrabotus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arby.nostrabotus.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
